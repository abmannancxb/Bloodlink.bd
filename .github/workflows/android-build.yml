name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build & Package Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Web Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Application
        run: npx vite build
        env:
          VITE_APP_MODE: production

      - name: Set up Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Synchronize Capacitor Project
        run: |
          npx cap sync android

      - name: Download clean Gradle Wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -sSLo android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar

      - name: Grant Execute Permission to Gradle
        run: |
          sed -i 's/\r$//' android/gradlew
          chmod +x android/gradlew

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bloodlink-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
